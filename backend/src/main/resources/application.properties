# =============================================
# Smart e-Waste - Application Configuration
# =============================================

# Server
server.port=8080

# ---- MySQL Database ----
# UPDATE these values before running
spring.datasource.url=jdbc:mysql://localhost:3306/ewaste_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---- JWT ----
jwt.secret=eWasteSmartSystemSecretKey2024VeryLongSecureString
jwt.expiration.ms=86400000

# ---- Email (Gmail SMTP) ----
# Set to false if you don't want email — app works without it
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000


# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ---- Logging ----
logging.level.com.ewaste=DEBUG
logging.level.org.springframework.security=WARN
